name: betto_schema
description: >-
  Pure Dart JSON Schema 2020-12 library. Typed, composable validators, a full
  keyword rule tree, and format validators for email, URI, date-time, UUID, and
  more.
version: 0.1.0-dev.3
repository: https://github.com/bettongia/schema
homepage: https://bettongia.github.io/schema/
issue_tracker: https://github.com/bettongia/schema/issues

topics:
  - schema
  - json-schema
  - validation

environment:
  sdk: "^3.12.0"

# Add regular dependencies here.
dependencies:
  characters: ^1.3.0
  collection: ^1.19.1
  intl: ^0.20.2
  uuid: ^4.5.3
  betto_common: ^0.1.0-dev.2
  betto_abnf: ^0.1.0-dev.2

dev_dependencies:
  lints: ^6.0.0
  test: ^1.29.0
